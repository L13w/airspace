<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0e14" rx="4"/>

  <!-- Class B airspace - inverted wedding cake (wider at top) -->
  <!-- Top tier - widest -->
  <rect x="4" y="6" width="24" height="6" fill="#3b82f6" fill-opacity="0.8" rx="1"/>

  <!-- Middle tier -->
  <rect x="8" y="13" width="16" height="6" fill="#3b82f6" fill-opacity="0.7" rx="1"/>

  <!-- Bottom tier - narrowest (core) -->
  <rect x="12" y="20" width="8" height="6" fill="#3b82f6" fill-opacity="0.9" rx="1"/>

  <!-- Subtle glow effect -->
  <rect x="4" y="6" width="24" height="6" fill="none" stroke="#60a5fa" stroke-width="0.5" rx="1" opacity="0.6"/>
  <rect x="8" y="13" width="16" height="6" fill="none" stroke="#60a5fa" stroke-width="0.5" rx="1" opacity="0.6"/>
  <rect x="12" y="20" width="8" height="6" fill="none" stroke="#60a5fa" stroke-width="0.5" rx="1" opacity="0.6"/>
</svg>
